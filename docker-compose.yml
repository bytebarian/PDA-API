services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pda}
      POSTGRES_USER: ${POSTGRES_USER:-pda}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pda_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pda} -d ${POSTGRES_DB:-pda}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      PDA_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-pda}:${POSTGRES_PASSWORD:-pda_dev}@db:5432/${POSTGRES_DB:-pda}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - ./storage:/app/storage

volumes:
  pgdata:
